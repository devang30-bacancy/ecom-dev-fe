<div class="card">
  <h2>Reset Password</h2>
  <p class="description">
    Enter your reset token and new password.
  </p>
  <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="token">Reset Token</label>
      <input
        type="text"
        id="token"
        formControlName="token"
        [class.error-input]="isFieldInvalid('token')"
        placeholder="Paste your reset token here"
      />
      <div class="error" *ngIf="isFieldInvalid('token')">
        <span *ngIf="resetPasswordForm.get('token')?.errors?.['required']">
          Reset token is required
        </span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">New Password</label>
      <input
        type="password"
        id="password"
        formControlName="password"
        [class.error-input]="isFieldInvalid('password')"
      />
      <div class="error" *ngIf="isFieldInvalid('password')">
        <span *ngIf="resetPasswordForm.get('password')?.errors?.['required']">Password is required</span>
        <span *ngIf="resetPasswordForm.get('password')?.errors?.['minlength']">
          Password must be at least 8 characters
        </span>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm New Password</label>
      <input
        type="password"
        id="confirmPassword"
        formControlName="confirmPassword"
        [class.error-input]="isFieldInvalid('confirmPassword') || passwordsDoNotMatch()"
      />
      <div class="error" *ngIf="isFieldInvalid('confirmPassword')">
        <span *ngIf="resetPasswordForm.get('confirmPassword')?.errors?.['required']">
          Please confirm your password
        </span>
      </div>
      <div class="error" *ngIf="passwordsDoNotMatch() && resetPasswordForm.get('confirmPassword')?.touched">
        Passwords do not match
      </div>
    </div>

    <div class="error" *ngIf="error">{{ error }}</div>
    <div class="success" *ngIf="success">{{ success }}</div>

    <button
      type="submit"
      [disabled]="resetPasswordForm.invalid || passwordsDoNotMatch() || loading"
    >
      {{ loading ? 'Resetting...' : 'Reset Password' }}
    </button>
  </form>

  <p class="link-text">
    Don't have a token?
    <a routerLink="/forgot-password" class="link">Request one here</a>
  </p>
  <p class="link-text">
    <a routerLink="/login" class="link">Back to Login</a>
  </p>
</div>
